#
# Example workflow: run nfr-review using the pre-built Docker image.
#
# Container mode skips Python setup and pip install — the scan runs
# inside the ghcr.io/jimakennedy/nfr-review image, which includes all
# extras (pdf, diagrams) and the gh CLI for issue sync.
#
# This is faster for repeated runs (image layers are cached) and avoids
# pip dependency resolution on every invocation.
#
# Usage — copy this file to .github/workflows/nfr-review.yml in the
# repository you want to scan and adjust the `with:` inputs below.

name: NFR Review (container)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write           # required if create-issues is true
  pull-requests: write
  security-events: write  # required only if sarif-upload is true

jobs:
  nfr-review:
    name: NFR Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run NFR Review
        id: nfr
        uses: JimAKennedy/nfr-review@v1
        with:
          execution: "container"
          # image: "ghcr.io/jimakennedy/nfr-review:1.2.3"  # pin a version
          path: .
          fail-on: "red"
          sarif-upload: "true"
          comment: "true"
          create-issues: "true"
          rag-min: "amber"
          first-run-cap: "25"
          # anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}  # enable LLM features

      - name: Summary
        if: always()
        run: |
          echo "## NFR Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | ${{ steps.nfr.outputs.findings-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Red | ${{ steps.nfr.outputs.red-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amber | ${{ steps.nfr.outputs.amber-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Green | ${{ steps.nfr.outputs.green-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues created | ${{ steps.nfr.outputs.issues-created }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues updated | ${{ steps.nfr.outputs.issues-updated }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues closed | ${{ steps.nfr.outputs.issues-closed }} |" >> $GITHUB_STEP_SUMMARY
