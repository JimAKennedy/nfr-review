#
# Example workflow: run a full nfr-review scan on the default branch,
# upload SARIF, create/sync GitHub issues, and publish a baseline
# artifact for downstream PR workflows to consume.
#
# Triggers:
#   push → main:  Refreshes the baseline immediately after every merge
#                  so the next PR scan diffs against fresh data (no
#                  chicken-and-egg lag).
#   schedule:      Catches drift even when no PRs are landing.  Skips
#                  the scan automatically if no commits arrived since
#                  the last successful run.
#   workflow_dispatch: Manual trigger for ad-hoc runs.
#
# Usage — copy this file to .github/workflows/nfr-review-nightly.yml
# in the repository you want to scan and adjust the schedule / inputs.

name: NFR Review (nightly)

on:
  push:
    branches: [main]             # refresh baseline immediately after merge
  schedule:
    - cron: "0 3 * * *"          # 03:00 UTC daily — catches drift
  workflow_dispatch:              # manual trigger for ad-hoc runs

concurrency:
  group: nfr-review-nightly
  cancel-in-progress: false      # let a running scan finish

permissions:
  actions: read                  # required for gh run list (skip check)
  contents: read
  issues: write                  # required for create-issues
  security-events: write         # required for SARIF upload

jobs:
  nfr-review:
    name: NFR Review (nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0         # full history for git-based collectors

      # ── Skip if unchanged (scheduled runs only) ──────────────────────
      - name: Check for new commits since last successful run
        if: github.event_name == 'schedule'
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RUN=$(gh run list \
            --workflow=nfr-review-nightly.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json createdAt \
            --jq '.[0].createdAt' 2>/dev/null || true)
          if [ -z "$LAST_RUN" ] || [ "$LAST_RUN" = "null" ]; then
            echo "No prior successful run — proceeding with scan"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW_COMMITS=$(git log --since="$LAST_RUN" --oneline | wc -l | tr -d ' ')
          if [ "$NEW_COMMITS" = "0" ]; then
            echo "::notice::No commits since last successful run ($LAST_RUN) — skipping scan"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NEW_COMMITS commit(s) since $LAST_RUN — proceeding with scan"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NFR Review
        if: steps.check.outputs.skip != 'true'
        id: nfr
        uses: JimAKennedy/nfr-review@v1
        with:
          path: .
          fail-on: "never"       # nightly is observational — never fail the job
          sarif-upload: "true"
          comment: "false"       # no PR to comment on
          create-issues: "true"
          rag-min: "amber"       # file issues for amber + red findings
          first-run-cap: "25"    # prevent issue flood on first adoption
          # anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}  # enable LLM features
          # extra-labels: "team:platform,nfr"
          # config: ".nfr-review.yaml"
          # execution: "container"
          # image: "ghcr.io/jimakennedy/nfr-review:1.2.3"

      # ── Artifacts ─────────────────────────────────────────────────────
      - name: Upload baseline artifact
        if: always() && steps.check.outputs.skip != 'true' && steps.nfr.outputs.jsonl-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: nfr-review-baseline
          path: ${{ steps.nfr.outputs.jsonl-path }}
          retention-days: 90     # PR workflow downloads this for diff mode

      - name: Upload SARIF artifact
        if: always() && steps.check.outputs.skip != 'true' && steps.nfr.outputs.sarif-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: nfr-review-sarif
          path: ${{ steps.nfr.outputs.sarif-path }}
          retention-days: 365

      # ── Job summary ───────────────────────────────────────────────────
      - name: Summary (skipped)
        if: always() && steps.check.outputs.skip == 'true'
        run: |
          echo "## NFR Review (nightly) — skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No commits since last successful run. Scan skipped to save CI minutes." >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          echo "## NFR Review (nightly)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | ${{ steps.nfr.outputs.findings-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Red | ${{ steps.nfr.outputs.red-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amber | ${{ steps.nfr.outputs.amber-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Green | ${{ steps.nfr.outputs.green-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues created | ${{ steps.nfr.outputs.issues-created }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues updated | ${{ steps.nfr.outputs.issues-updated }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues closed | ${{ steps.nfr.outputs.issues-closed }} |" >> $GITHUB_STEP_SUMMARY
