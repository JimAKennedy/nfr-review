exclude: '^\.agents/'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: 'tests/fixtures/configs/invalid\.yaml|tests/fixtures/helm-.*/templates/.*\.yaml|tests/fixtures/patching-comprehensive-.*/.*\.yaml'
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: 'src/nfr_review/data/mermaid\.min\.js'
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r]
        files: ^src/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.2
          - click>=8.1
          - anthropic>=0.39
          - ruamel.yaml>=0.18
          - tree-sitter>=0.23
          - tree-sitter-java>=0.23
          - tree-sitter-python>=0.23
          - tree-sitter-go>=0.23
          - tree-sitter-hcl>=1.1
          - tree-sitter-dockerfile>=0.2
          - tree-sitter-c-sharp>=0.23
          - tree-sitter-typescript>=0.23
          - resolvelib>=1.0
          - packaging>=23.0
          - PyYAML>=6.0
          - types-PyYAML>=6.0
        args: [--config-file=pyproject.toml, src/]
        pass_filenames: false
        files: ^src/
