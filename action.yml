name: "NFR Review"
description: "Run nfr-review on a repository and post a RAG summary to the PR"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Path to the repository to scan (alias: target)"
    required: false
    default: "."
  target:
    description: "Deprecated — use 'path' instead"
    required: false
    default: ""
  config:
    description: "Path to nfr-review.yaml config file"
    required: false
    default: ""
  baseline:
    description: "Path to baseline JSONL for diff mode"
    required: false
    default: ""
  fail-on:
    description: "Failure threshold: 'red' (default), 'red+amber', or 'never'"
    required: false
    default: "red"
  fail-on-red:
    description: "Deprecated — use 'fail-on' instead. Kept for backward compat."
    required: false
    default: ""
  sarif:
    description: "Override path for SARIF output file"
    required: false
    default: ""
  sarif-upload:
    description: "Whether to upload SARIF to GitHub Security tab"
    required: false
    default: "false"
  comment:
    description: "Whether to post a PR comment with results"
    required: false
    default: "true"
  create-issues:
    description: "Whether to sync GitHub issues for findings"
    required: false
    default: "false"
  file-issues:
    description: "Deprecated — use 'create-issues' instead"
    required: false
    default: ""
  issue-severity:
    description: "Minimum severity for issue filing (critical, high, medium, low, info)"
    required: false
    default: "high"
  rag-min:
    description: "Minimum RAG level for issue filing (red, amber, green)"
    required: false
    default: "amber"
  extra-labels:
    description: "Comma-separated extra labels for filed issues"
    required: false
    default: ""
  first-run-cap:
    description: "Max issues to create on the first sync (prevents flooding)"
    required: false
    default: "25"
  python-version:
    description: "Python version to use (pip mode only, ignored in container mode)"
    required: false
    default: "3.12"
  execution:
    description: "Execution mode: 'pip' installs via pip, 'container' uses pre-built Docker image"
    required: false
    default: "pip"
  image:
    description: "Docker image for container mode (default: ghcr.io/jimakennedy/nfr-review:latest)"
    required: false
    default: "ghcr.io/jimakennedy/nfr-review:latest"
  anthropic-api-key:
    description: "Anthropic API key for LLM-powered features (executive summary, ADR drift, PII detection). Omit to skip LLM features gracefully."
    required: false
    default: ""

outputs:
  findings-count:
    description: "Total number of findings"
    value: ${{ steps.parse.outputs.findings-count }}
  red-count:
    description: "Number of red findings"
    value: ${{ steps.parse.outputs.red-count }}
  amber-count:
    description: "Number of amber findings"
    value: ${{ steps.parse.outputs.amber-count }}
  green-count:
    description: "Number of green findings"
    value: ${{ steps.parse.outputs.green-count }}
  exit-code:
    description: "Exit code of the nfr-review run (0=pass, 2=threshold exceeded)"
    value: ${{ steps.scan.outputs.exit-code }}
  sarif-path:
    description: "Path to the generated SARIF file (empty if sarif-upload is false)"
    value: ${{ steps.scan.outputs.sarif-path }}
  jsonl-path:
    description: "Path to the generated JSONL findings file"
    value: ${{ steps.scan.outputs.jsonl-path }}
  issues-created:
    description: "Number of GitHub issues created"
    value: ${{ steps.sync-issues.outputs.issues-created }}
  issues-updated:
    description: "Number of GitHub issues updated"
    value: ${{ steps.sync-issues.outputs.issues-updated }}
  issues-closed:
    description: "Number of GitHub issues closed"
    value: ${{ steps.sync-issues.outputs.issues-closed }}

runs:
  using: "composite"
  steps:
    # ── 1. Set up Python (pip mode only) ────────────────────────────────
    - name: Set up Python
      if: inputs.execution != 'container'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    # ── 2. Install nfr-review (pip mode only) ───────────────────────────
    - name: Install nfr-review
      if: inputs.execution != 'container'
      shell: bash
      run: pip install "${{ github.action_path }}"

    # ── 3. Pull container image (container mode only) ───────────────────
    - name: Pull nfr-review image
      if: inputs.execution == 'container'
      shell: bash
      run: docker pull "${{ inputs.image }}"

    # ── 4. Resolve backward-compat inputs ───────────────────────────────
    - name: Resolve inputs
      id: resolve
      shell: bash
      run: |
        # path vs deprecated target
        SCAN_PATH="${{ inputs.path }}"
        if [ -n "${{ inputs.target }}" ]; then
          SCAN_PATH="${{ inputs.target }}"
        fi
        echo "scan-path=${SCAN_PATH}" >> "$GITHUB_OUTPUT"

        # fail-on vs deprecated fail-on-red
        # When fail-on-red is explicitly set and fail-on is at its default,
        # map the old boolean to the new enum.
        FAIL_ON="${{ inputs.fail-on }}"
        FAIL_ON_RED="${{ inputs.fail-on-red }}"
        if [ -n "$FAIL_ON_RED" ]; then
          if [ "$FAIL_ON_RED" = "false" ]; then
            FAIL_ON="never"
          elif [ "$FAIL_ON_RED" = "true" ]; then
            FAIL_ON="red"
          fi
        fi
        echo "fail-on=${FAIL_ON}" >> "$GITHUB_OUTPUT"

        # create-issues vs deprecated file-issues
        CREATE_ISSUES="${{ inputs.create-issues }}"
        FILE_ISSUES="${{ inputs.file-issues }}"
        if [ -n "$FILE_ISSUES" ] && [ "$CREATE_ISSUES" = "false" ]; then
          CREATE_ISSUES="$FILE_ISSUES"
        fi
        echo "create-issues=${CREATE_ISSUES}" >> "$GITHUB_OUTPUT"

    # ── 5. Run nfr-review scan ──────────────────────────────────────────
    - name: Run nfr-review scan
      id: scan
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set +e

        SCAN_PATH="${{ steps.resolve.outputs.scan-path }}"

        JSONL_PATH="${{ runner.temp }}/nfr-review-output.jsonl"

        # Determine SARIF path
        SARIF_PATH=""
        if [ "${{ inputs.sarif-upload }}" = "true" ] || [ -n "${{ inputs.sarif }}" ]; then
          if [ -n "${{ inputs.sarif }}" ]; then
            SARIF_PATH="${{ inputs.sarif }}"
          else
            SARIF_PATH="${{ runner.temp }}/nfr-review.sarif"
          fi
        fi

        if [ "${{ inputs.execution }}" = "container" ]; then
          # ── Container mode ──────────────────────────────────────────
          # Map host paths to container mount points:
          #   $GITHUB_WORKSPACE -> /repo
          #   $RUNNER_TEMP      -> /output
          CONTAINER_SCAN="/repo"
          if [ "$SCAN_PATH" != "." ] && [ "$SCAN_PATH" != "./" ]; then
            CONTAINER_SCAN="/repo/${SCAN_PATH#./}"
          fi

          DOCKER_ARGS=("run" "--rm")
          DOCKER_ARGS+=("--user" "$(id -u):$(id -g)")
          DOCKER_ARGS+=("-e" "HOME=/tmp")
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            DOCKER_ARGS+=("-e" "ANTHROPIC_API_KEY")
          fi
          DOCKER_ARGS+=("-v" "${{ github.workspace }}:/repo")
          DOCKER_ARGS+=("-v" "${{ runner.temp }}:/output")
          DOCKER_ARGS+=("${{ inputs.image }}")
          DOCKER_ARGS+=("run" "$CONTAINER_SCAN")
          DOCKER_ARGS+=("--jsonl" "/output/nfr-review-output.jsonl")

          if [ -n "${{ inputs.config }}" ]; then
            DOCKER_ARGS+=("--config" "/repo/${{ inputs.config }}")
          fi

          if [ -n "${{ inputs.baseline }}" ]; then
            DOCKER_ARGS+=("--baseline" "/repo/${{ inputs.baseline }}")
          fi

          if [ -n "$SARIF_PATH" ]; then
            SARIF_BASENAME="$(basename "$SARIF_PATH")"
            DOCKER_ARGS+=("--sarif" "/output/${SARIF_BASENAME}")
            SARIF_PATH="${{ runner.temp }}/${SARIF_BASENAME}"
          fi

          docker "${DOCKER_ARGS[@]}"
          EXIT_CODE=$?
        else
          # ── Pip mode ────────────────────────────────────────────────
          ARGS=("run" "${SCAN_PATH}")

          if [ -n "${{ inputs.config }}" ]; then
            ARGS+=("--config" "${{ inputs.config }}")
          fi

          if [ -n "${{ inputs.baseline }}" ]; then
            ARGS+=("--baseline" "${{ inputs.baseline }}")
          fi

          ARGS+=("--jsonl" "$JSONL_PATH")

          if [ -n "$SARIF_PATH" ]; then
            ARGS+=("--sarif" "$SARIF_PATH")
          fi

          nfr-review "${ARGS[@]}"
          EXIT_CODE=$?
        fi

        echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
        echo "jsonl-path=${JSONL_PATH}" >> "$GITHUB_OUTPUT"
        echo "sarif-path=${SARIF_PATH}" >> "$GITHUB_OUTPUT"

        # Always succeed here — we gate on findings in a later step.
        exit 0

    # ── 6. Upload SARIF ─────────────────────────────────────────────────
    - name: Upload SARIF
      if: inputs.sarif-upload == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}

    # ── 7. Parse JSONL and set output counts ────────────────────────────
    - name: Parse results
      id: parse
      shell: bash
      run: |
        JSONL_PATH="${{ steps.scan.outputs.jsonl-path }}"
        if [ ! -f "$JSONL_PATH" ]; then
          echo "findings-count=0" >> "$GITHUB_OUTPUT"
          echo "red-count=0" >> "$GITHUB_OUTPUT"
          echo "amber-count=0" >> "$GITHUB_OUTPUT"
          echo "green-count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        python3 -c "
        import json
        from pathlib import Path

        counts = {'red': 0, 'amber': 0, 'green': 0}
        for line in Path('${JSONL_PATH}').read_text().splitlines():
            rec = json.loads(line)
            if rec.get('record_type') == 'finding' and rec.get('rag') in counts:
                counts[rec['rag']] += 1

        total = sum(counts.values())
        print(f'findings-count={total}')
        print(f'red-count={counts[\"red\"]}')
        print(f'amber-count={counts[\"amber\"]}')
        print(f'green-count={counts[\"green\"]}')
        " >> "$GITHUB_OUTPUT"

    # ── 8. Generate PR comment ──────────────────────────────────────────
    - name: Generate comment body
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      id: comment-body
      shell: bash
      run: |
        JSONL_PATH="${{ steps.scan.outputs.jsonl-path }}"
        BODY_PATH="${{ runner.temp }}/nfr-review-comment.md"

        if [ -f "$JSONL_PATH" ]; then
          python3 "${{ github.action_path }}/scripts/action_comment.py" "$JSONL_PATH" > "$BODY_PATH"
        else
          echo "<!-- nfr-review-comment -->" > "$BODY_PATH"
          echo "## NFR Review Results" >> "$BODY_PATH"
          echo "" >> "$BODY_PATH"
          echo "No findings generated (scan may have failed)." >> "$BODY_PATH"
        fi

        echo "body-path=${BODY_PATH}" >> "$GITHUB_OUTPUT"

    # ── 9. Post / update sticky PR comment ──────────────────────────────
    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: ${{ steps.comment-body.outputs.body-path }}
        comment-tag: nfr-review-comment

    # ── 10. Sync GitHub issues ──────────────────────────────────────────
    - name: Sync remediation issues
      if: steps.resolve.outputs.create-issues == 'true'
      id: sync-issues
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        JSONL_PATH="${{ steps.scan.outputs.jsonl-path }}"
        if [ ! -f "$JSONL_PATH" ]; then
          echo "issues-created=0" >> "$GITHUB_OUTPUT"
          echo "issues-updated=0" >> "$GITHUB_OUTPUT"
          echo "issues-closed=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        SYNC_ARGS=("issues" "sync")
        SYNC_ARGS+=("--jsonl" "$JSONL_PATH")
        SYNC_ARGS+=("--repo" "${{ github.repository }}")
        SYNC_ARGS+=("--severity-threshold" "${{ inputs.issue-severity }}")
        SYNC_ARGS+=("--rag-min" "${{ inputs.rag-min }}")
        SYNC_ARGS+=("--first-run-cap" "${{ inputs.first-run-cap }}")

        if [ -n "${{ inputs.extra-labels }}" ]; then
          IFS=',' read -ra LABELS <<< "${{ inputs.extra-labels }}"
          for lbl in "${LABELS[@]}"; do
            SYNC_ARGS+=("--label" "$(echo "$lbl" | xargs)")
          done
        fi

        if [ "${{ inputs.execution }}" = "container" ]; then
          # ── Container mode ──────────────────────────────────────────
          DOCKER_ARGS=("run" "--rm")
          DOCKER_ARGS+=("--user" "$(id -u):$(id -g)")
          DOCKER_ARGS+=("-e" "HOME=/tmp")
          DOCKER_ARGS+=("-e" "GITHUB_TOKEN")
          DOCKER_ARGS+=("-v" "${{ runner.temp }}:/output:ro")
          DOCKER_ARGS+=("${{ inputs.image }}")

          # Remap JSONL path to container mount
          CONTAINER_SYNC_ARGS=("issues" "sync")
          CONTAINER_SYNC_ARGS+=("--jsonl" "/output/nfr-review-output.jsonl")
          CONTAINER_SYNC_ARGS+=("--repo" "${{ github.repository }}")
          CONTAINER_SYNC_ARGS+=("--severity-threshold" "${{ inputs.issue-severity }}")
          CONTAINER_SYNC_ARGS+=("--rag-min" "${{ inputs.rag-min }}")
          CONTAINER_SYNC_ARGS+=("--first-run-cap" "${{ inputs.first-run-cap }}")

          if [ -n "${{ inputs.extra-labels }}" ]; then
            IFS=',' read -ra LABELS <<< "${{ inputs.extra-labels }}"
            for lbl in "${LABELS[@]}"; do
              CONTAINER_SYNC_ARGS+=("--label" "$(echo "$lbl" | xargs)")
            done
          fi

          OUTPUT=$(docker "${DOCKER_ARGS[@]}" "${CONTAINER_SYNC_ARGS[@]}" 2>&1)
        else
          # ── Pip mode ────────────────────────────────────────────────
          OUTPUT=$(nfr-review "${SYNC_ARGS[@]}" 2>&1)
        fi

        echo "$OUTPUT"

        # Parse sync summary line: "sync: created=N updated=N closed=N ..."
        CREATED=$(echo "$OUTPUT" | grep -oP 'created=\K[0-9]+' || echo "0")
        UPDATED=$(echo "$OUTPUT" | grep -oP 'updated=\K[0-9]+' || echo "0")
        CLOSED=$(echo "$OUTPUT" | grep -oP 'closed=\K[0-9]+' || echo "0")

        echo "issues-created=${CREATED}" >> "$GITHUB_OUTPUT"
        echo "issues-updated=${UPDATED}" >> "$GITHUB_OUTPUT"
        echo "issues-closed=${CLOSED}" >> "$GITHUB_OUTPUT"

    # ── 11. Fail on findings threshold ──────────────────────────────────
    - name: Check findings threshold
      if: steps.resolve.outputs.fail-on != 'never'
      shell: bash
      run: |
        FAIL_ON="${{ steps.resolve.outputs.fail-on }}"
        RED_COUNT="${{ steps.parse.outputs.red-count }}"
        AMBER_COUNT="${{ steps.parse.outputs.amber-count }}"

        if [ "${FAIL_ON}" = "red+amber" ]; then
          TOTAL=$(( RED_COUNT + AMBER_COUNT ))
          if [ "${TOTAL}" -gt 0 ]; then
            echo "::error::nfr-review found ${RED_COUNT} red + ${AMBER_COUNT} amber finding(s) — failing the check"
            exit 1
          fi
          echo "No red or amber findings — check passed"
        else
          # Default: fail on red
          if [ "${RED_COUNT}" -gt 0 ]; then
            echo "::error::nfr-review found ${RED_COUNT} red finding(s) — failing the check"
            exit 1
          fi
          echo "No red findings — check passed"
        fi
