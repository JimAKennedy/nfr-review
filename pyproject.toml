[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nfr-review"
version = "0.1.0"
description = "Automated non-functional design reviews for software projects."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Jim Kennedy" }]
dependencies = [
    "click>=8.1",
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    "ruamel.yaml>=0.18",
    "tree-sitter>=0.23",
    "tree-sitter-java>=0.23",
]

[project.scripts]
nfr-review = "nfr_review.cli:cli"

[project.optional-dependencies]
llm = [
    "anthropic>=0.39",
]
dev = [
    "anthropic>=0.39",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "mypy>=1.11",
    "bandit[toml]>=1.7",
    "pre-commit>=3.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nfr_review"]

[tool.ruff]
target-version = "py311"
line-length = 95
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line length (handled by formatter)
    "TC001",  # move import into TYPE_CHECKING (too aggressive for this codebase)
    "TC002",  # move third-party import into TYPE_CHECKING
    "TC003",  # move stdlib import into TYPE_CHECKING
    "N812",   # lowercase imported as non-lowercase (false positive on __version__)
    "SIM108", # ternary suggestions often reduce readability
]

[tool.ruff.lint.isort]
known-first-party = ["nfr_review"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["N802", "N803", "RUF012"]
"src/nfr_review/rules/**/*.py" = ["RUF012"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"

[tool.coverage.run]
source = ["src/nfr_review"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70

[tool.mypy]
python_version = "3.11"
strict = false
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tree_sitter.*", "tree_sitter_java.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["nfr_review.llm_client"]
disable_error_code = ["union-attr"]

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]
