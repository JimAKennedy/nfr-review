# Default OTel Collector config for nfr-review --collector mode.
# Receives OTLP traces and writes them to a local NDJSON file for
# Band 3 dynamic analysis rules.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  file:
    path: "${NFR_TRACE_OUTPUT_PATH}"
    format: json

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file]
