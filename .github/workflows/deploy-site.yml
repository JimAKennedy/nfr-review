name: Deploy Documentation Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/nfr_review/rules/**'
      - 'src/nfr_review/rule_metadata.py'
      - 'src/nfr_review/compliance_mapping.py'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: azure/setup-helm@v4
        with:
          version: 'latest'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -n auto -m "not regression" --timeout=300

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate rules.json
        run: |
          pip install -e . --quiet
          python -m nfr_review.cli list-rules --format json > site/src/data/rules.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build
        working-directory: site
        run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
