name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_GIST_ID: ${{ vars.COVERAGE_GIST_ID }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ tests/ --check --diff

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy src/

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'latest'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml --junitxml=test-results.xml

      - name: Coverage threshold check
        run: coverage report --fail-under=70

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Extract coverage percentage
        id: cov
        if: matrix.python-version == '3.12'
        run: |
          COV_PCT=$(coverage report --format=total)
          echo "pct=${COV_PCT}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COV_PCT}%"

      - name: Update coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ env.COVERAGE_GIST_ID }}
          filename: nfr-review-coverage.json
          label: coverage
          message: "${{ steps.cov.outputs.pct }}%"
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: pytest

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            COV_PCT="${{ steps.cov.outputs.pct }}"
            echo "Coverage: ${COV_PCT:-unknown}%" >> $GITHUB_STEP_SUMMARY
          fi

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pip-licenses

      - name: Check licenses
        run: |
          pip-licenses --from=mixed --allow-only='
            Apache Software License;
            Apache Software License; MIT License;
            Apache-2.0;
            Apache-2.0 OR BSD-2-Clause;
            BSD License;
            BSD-2-Clause;
            BSD-3-Clause;
            DFSG approved; MIT License;
            ISC License (ISCL);
            MIT;
            MIT License;
            Mozilla Public License 2.0 (MPL 2.0);
            PSF-2.0;
            Python Software Foundation License'

  # Advisory job — requires GITLEAKS_LICENSE which is unavailable on fork PRs.
  # ci-complete does not gate on secrets-scan.result, so fork PRs are not blocked.
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, license-check, secrets-scan]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.typecheck.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.license-check.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-check.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result == 'success' && '✓' || '⚠' }} |" >> $GITHUB_STEP_SUMMARY
