name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  COVERAGE_GIST_ID: ${{ vars.COVERAGE_GIST_ID }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ tests/ --check --diff

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy src/

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'latest'

      - name: Install dependencies
        run: pip install -e ".[dev,graphify]"

      - name: Run tests with coverage
        run: pytest -n auto -m "not regression" --cov --cov-report=term-missing --cov-report=xml --junitxml=test-results.xml

      - name: Coverage threshold check
        run: coverage report --fail-under=88

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Extract coverage percentage
        id: cov
        if: matrix.python-version == '3.12'
        run: |
          COV_PCT=$(coverage report --format=total)
          echo "pct=${COV_PCT}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COV_PCT}%"

      - name: Update coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ env.COVERAGE_GIST_ID }}
          filename: nfr-review-coverage.json
          label: coverage
          message: "${{ steps.cov.outputs.pct }}%"
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: pytest

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            COV_PCT="${{ steps.cov.outputs.pct }}"
            echo "Coverage: ${COV_PCT:-unknown}%" >> $GITHUB_STEP_SUMMARY
          fi

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pip-licenses

      - name: Check licenses
        run: |
          pip-licenses --from=mixed --allow-only='
            Apache Software License;
            Apache Software License; MIT License;
            Apache-2.0;
            Apache-2.0 OR BSD-2-Clause;
            BSD License;
            BSD-2-Clause;
            BSD-3-Clause;
            DFSG approved; MIT License;
            ISC License (ISCL);
            MIT;
            MIT License;
            Mozilla Public License 2.0 (MPL 2.0);
            PSF-2.0;
            Python Software Foundation License'

  # Advisory job — requires GITLEAKS_LICENSE which is unavailable on fork PRs.
  # ci-complete does not gate on secrets-scan.result, so fork PRs are not blocked.
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  cve-scan:
    name: Docker CVE Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - 'requirements*.in'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image for scanning
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: nfr-review:cve-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CVE scan
        if: steps.filter.outputs.docker == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: nfr-review:cve-scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Scan skipped
        if: steps.filter.outputs.docker != 'true'
        run: echo "No Docker-related files changed — CVE scan skipped"

  container-e2e:
    name: Container E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - 'requirements*.in'
              - 'src/**'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build container
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: nfr-review:e2e-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: E2E — version check
        if: steps.filter.outputs.docker == 'true'
        run: |
          docker run --rm --entrypoint sh nfr-review:e2e-test \
            -c 'nfr-review --version'

      - name: E2E — fixture scan
        if: steps.filter.outputs.docker == 'true'
        run: |
          docker run --rm --entrypoint sh \
            -v "${{ github.workspace }}/tests/fixtures/cpp-integration-repo:/repo:ro" \
            -w /repo \
            nfr-review:e2e-test \
            -c 'nfr-review run --score --csv /tmp/out.csv --jsonl /tmp/out.jsonl .'

      - name: E2E skipped
        if: steps.filter.outputs.docker != 'true'
        run: echo "No container-relevant files changed — E2E test skipped"

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, license-check, secrets-scan, cve-scan, container-e2e]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.typecheck.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.license-check.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-check.result == 'success' && '✓' || '✗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result == 'success' && '✓' || '⚠' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker CVE Scan | ${{ needs.cve-scan.result == 'success' && '✓' || (needs.cve-scan.result == 'skipped' && '—' || '⚠') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container E2E | ${{ needs.container-e2e.result == 'success' && '✓' || (needs.container-e2e.result == 'skipped' && '—' || '⚠') }} |" >> $GITHUB_STEP_SUMMARY
