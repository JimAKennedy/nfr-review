# Nightly CI: dogfood nfr-review against itself, run regression test suite,
# and validate the dynamic analysis pipeline against synthetic OTel traces.
# Regression tests clone public repos and diff output against snapshot baselines.
# They are excluded from PR CI to keep feedback fast (<1 min vs ~6 min).

name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      refresh_snapshots:
        description: "Regenerate regression snapshots from CI environment and open a PR"
        type: boolean
        default: false

concurrency:
  group: nfr-review-nightly
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  # ── Dogfood: run nfr-review on itself ────────────────────────────────────
  nfr-review:
    name: NFR Review (dogfood)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Graphify
        run: pip install "graphifyy>=0.8"

      - name: Run Graphify extraction
        run: |
          graphify update . --no-cluster
          graphify cluster-only . --no-viz --no-label

      - name: Run NFR Review
        id: nfr
        uses: ./
        with:
          path: .
          fail-on: "never"
          sarif-upload: "true"
          comment: "false"
          create-issues: "false"
          origin: "first_party"

      - name: Upload baseline artifact
        if: always() && steps.nfr.outputs.jsonl-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nfr-review-baseline
          path: ${{ steps.nfr.outputs.jsonl-path }}
          retention-days: 90

      - name: Upload SARIF artifact
        if: always() && steps.nfr.outputs.sarif-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nfr-review-sarif
          path: ${{ steps.nfr.outputs.sarif-path }}
          retention-days: 365

      - name: Count structural findings
        id: structure
        if: always() && steps.nfr.outputs.jsonl-path != ''
        run: |
          JSONL_PATH="${{ steps.nfr.outputs.jsonl-path }}"
          if [ -f "$JSONL_PATH" ]; then
            STRUCT_COUNT=$(python3 -c "
          import json
          from pathlib import Path
          count = sum(1 for line in Path('${JSONL_PATH}').read_text().splitlines()
                      if line.strip()
                      and json.loads(line).get('record_type') == 'finding'
                      and json.loads(line).get('rule_id', '').startswith('structure-'))
          print(count)
          ")
            echo "count=${STRUCT_COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## NFR Review (dogfood)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | ${{ steps.nfr.outputs.findings-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Red | ${{ steps.nfr.outputs.red-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amber | ${{ steps.nfr.outputs.amber-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Green | ${{ steps.nfr.outputs.green-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Structural | ${{ steps.structure.outputs.count || '0' }} |" >> $GITHUB_STEP_SUMMARY

  # ── Regression: snapshot tests against public corpus repos ───────────────
  regression:
    name: Regression (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache regression repos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .regression-repos
          key: regression-repos-${{ hashFiles('tests/regression/manifest.yaml') }}
          restore-keys: |
            regression-repos-

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'latest'

      - name: Install dependencies
        run: pip install -e ".[dev,graphify]"

      - name: Run regression tests
        if: ${{ github.event.inputs.refresh_snapshots != 'true' }}
        run: pytest -n auto -m regression --timeout=600 -v --junitxml=regression-results.xml

      - name: Refresh snapshots
        if: ${{ github.event.inputs.refresh_snapshots == 'true' }}
        run: |
          pytest -n auto -m regression --timeout=600 -v --update-snapshots
          echo "snapshot_changed=$(git diff --quiet tests/regression/snapshots/ && echo false || echo true)" >> "$GITHUB_ENV"

      - name: Open snapshot PR
        if: ${{ github.event.inputs.refresh_snapshots == 'true' && env.snapshot_changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/refresh-regression-snapshots-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add tests/regression/snapshots/
          git commit -m "chore(regression): refresh snapshots from CI environment

          Regenerated on ubuntu-latest / Python ${{ matrix.python-version }}.
          Snapshots must be generated on the CI platform to avoid
          tree-sitter cross-platform parsing differences."
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(regression): refresh snapshots from CI" \
            --body "$(cat <<EOF
          ## Summary
          - Regenerated regression snapshots on ubuntu-latest / Python ${{ matrix.python-version }}
          - Ensures baselines match the CI environment where nightly tests run

          Snapshots generated locally (macOS) diverge from CI (Ubuntu) due to
          tree-sitter cross-platform parsing differences. This PR aligns the
          baselines with the CI environment.

          Triggered via: Actions > Nightly > Run workflow > refresh_snapshots=true
          EOF
          )" \
            --base main

      - name: Upload test results
        if: always() && github.event.inputs.refresh_snapshots != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: regression-results
          path: regression-results.xml
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Regression Tests (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.refresh_snapshots }}" = "true" ]; then
            if [ "${{ env.snapshot_changed }}" = "true" ]; then
              echo "Snapshots refreshed and PR opened." >> $GITHUB_STEP_SUMMARY
            else
              echo "Snapshots unchanged — no PR needed." >> $GITHUB_STEP_SUMMARY
            fi
          elif [ -f regression-results.xml ]; then
            echo "Results uploaded as artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file generated." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Dynamic analysis: validate OTel trace pipeline against fixtures ─────
  dynamic-analysis:
    name: Dynamic Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install dependencies
        run: pip install -e ".[dev,pdf]"

      - name: Run nfr-review with OTel traces
        run: |
          nfr-review report . \
            --otel-traces tests/fixtures/otel-traces/traces-multi-service-topology.json \
            --output-dir dynamic-output

      - name: Verify dynamic diagram sections
        run: |
          report=$(ls dynamic-output/*-nfr-review-*.md 2>/dev/null | head -1)
          if [ -z "$report" ]; then
            echo "::error::No markdown report found in dynamic-output/"
            exit 1
          fi
          echo "report=$report" >> "$GITHUB_ENV"
          if ! grep -q '```mermaid' "$report"; then
            echo "::error::No Mermaid diagram blocks found in report"
            exit 1
          fi
          diagrams=$(grep -c '```mermaid' "$report")
          echo "Found $diagrams Mermaid diagram block(s) in $report"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dynamic-analysis-report
          path: dynamic-output/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Dynamic Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          report=$(ls dynamic-output/*-nfr-review-*.md 2>/dev/null | head -1)
          if [ -n "$report" ]; then
            diagrams=$(grep -c '```mermaid' "$report" || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Mermaid diagrams | $diagrams |" >> $GITHUB_STEP_SUMMARY
            echo "| Report | Uploaded as artifact |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
