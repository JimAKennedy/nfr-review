# Nightly CI: dogfood nfr-review against itself + run regression test suite.
# Regression tests clone public repos and diff output against snapshot baselines.
# They are excluded from PR CI to keep feedback fast (<1 min vs ~6 min).

name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nfr-review-nightly
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  # ── Dogfood: run nfr-review on itself ────────────────────────────────────
  nfr-review:
    name: NFR Review (dogfood)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run NFR Review
        id: nfr
        uses: ./
        with:
          path: .
          fail-on: "never"
          sarif-upload: "true"
          comment: "false"
          create-issues: "false"

      - name: Upload baseline artifact
        if: always() && steps.nfr.outputs.jsonl-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nfr-review-baseline
          path: ${{ steps.nfr.outputs.jsonl-path }}
          retention-days: 90

      - name: Upload SARIF artifact
        if: always() && steps.nfr.outputs.sarif-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nfr-review-sarif
          path: ${{ steps.nfr.outputs.sarif-path }}
          retention-days: 365

      - name: Summary
        if: always()
        run: |
          echo "## NFR Review (dogfood)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | ${{ steps.nfr.outputs.findings-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Red | ${{ steps.nfr.outputs.red-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amber | ${{ steps.nfr.outputs.amber-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Green | ${{ steps.nfr.outputs.green-count }} |" >> $GITHUB_STEP_SUMMARY

  # ── Regression: snapshot tests against public corpus repos ───────────────
  regression:
    name: Regression (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache regression repos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .regression-repos
          key: regression-repos-${{ hashFiles('tests/regression/manifest.yaml') }}
          restore-keys: |
            regression-repos-

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'latest'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run regression tests
        run: pytest -n auto -m regression --timeout=600 -v --junitxml=regression-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: regression-results
          path: regression-results.xml
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Regression Tests (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f regression-results.xml ]; then
            echo "Results uploaded as artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file generated." >> $GITHUB_STEP_SUMMARY
          fi
