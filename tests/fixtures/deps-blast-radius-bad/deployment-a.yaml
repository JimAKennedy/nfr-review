apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: production
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      nodeSelector:
        pool: shared-general
      containers:
        - name: app
          image: myregistry.example.com/order-service:2.1.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres-shared.db.svc.cluster.local
            - name: REDIS_HOST
              value: redis-cache.cache.svc.cluster.local
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
