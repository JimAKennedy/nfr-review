syntax = "proto3";

package gaps.v1;

// Account has field number gaps suggesting deleted fields.
message Account {
  string id = 1;
  string name = 2;
  string email = 5;
  string phone = 8;
}

// Event has non-sequential fields without reserved.
message Event {
  string event_id = 1;
  string type = 3;
  string payload = 10;
}
