syntax = "proto3";

package badservice;

message Request {
  string id = 1;
}

message Response {
  string result = 1;
}

// No version suffix on this service name.
service OrderService {
  rpc PlaceOrder(Request) returns (Response);
  rpc CancelOrder(Request) returns (Response);
  rpc GetOrderStatus(Request) returns (Response);
}
