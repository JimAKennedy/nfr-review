syntax = "proto3";

package reserved.v1;

// Customer has gaps but proper reserved declarations.
message Customer {
  string id = 1;
  string name = 2;
  reserved 3, 4;
  string email = 5;
  string phone = 6;
}

// Product has a reserved range covering the gap.
message Product {
  string sku = 1;
  reserved 2 to 4;
  string name = 5;
  double price = 6;
}
