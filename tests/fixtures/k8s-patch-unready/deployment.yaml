apiVersion: apps/v1
kind: Deployment
metadata:
  name: patch-unready-app
  namespace: production
  labels:
    app: patch-unready-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patch-unready-app
  template:
    metadata:
      labels:
        app: patch-unready-app
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: app
          image: myregistry.example.com/patch-unready-app:0.9.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
