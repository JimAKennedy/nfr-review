name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: ruff check src/

      - name: Run tests
        run: pytest tests/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t myregistry.example.com/patch-unready-app:${{ github.sha }} .

      - name: Push container image
        run: docker push myregistry.example.com/patch-unready-app:${{ github.sha }}

      - name: Deploy to production
        run: kubectl set image deployment/patch-unready-app app=myregistry.example.com/patch-unready-app:${{ github.sha }}
