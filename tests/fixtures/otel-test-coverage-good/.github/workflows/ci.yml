name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        env:
          OTEL_TRACES_EXPORTER: otlp
          OTEL_SERVICE_NAME: otel-test-coverage-good
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
        run: mvn verify
